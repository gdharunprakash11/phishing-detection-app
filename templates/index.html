<!DOCTYPE html>
<html>
<head>
    <title>Phishing App</title>

    <!-- 🔥 VERY IMPORTANT -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        input, textarea {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: blue;
            color: white;
            border: none;
            font-size: 18px;
        }

        .logout {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h2>🔍 Phishing Detector</h2>

<div class="logout">
    <a href="/logout">Logout</a>
</div>

<form method="POST">

    <input type="text" name="url" placeholder="Enter URL">

    <input type="text" name="email" placeholder="Enter Email">

    <textarea name="text" placeholder="Enter Message"></textarea>

    <button type="submit">Check</button>

</form>

<h3>{{ result }}</h3>

</body>
</html>
