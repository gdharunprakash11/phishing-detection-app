<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            margin-top: 100px;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        h3 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔍 Phishing URL Detector</h2>

        <form method="POST">
            <input type="text" name="feature1" placeholder="Enter URL">
            <br>
            <button type="submit">Check</button>
        </form>

        <h3>{{ result }}</h3>
    </div>

</body>
</html>
